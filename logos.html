<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dongleer — Logo Concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Cinzel:wght@400;500&family=Great+Vibes&family=Montserrat:wght@100;200;300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <style>
    body { margin: 0; background: #111; }
    #root { width: 100%; height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

/* ── Palette ── */
const G = '#c9a84c';   // gold
const GL = '#dcc570';  // gold light
const GM = '#7a6530';  // gold muted
const GD = '#3d2e10';  // gold deep
const DARK = '#080808';
const DARK2 = '#0f0e0b';
const TXT  = '#f4f0e8';
const TXT2 = '#a09070';
const IVORY = '#f4f0e8';
const WARM_DARK = '#1a1510';
const DG = '#8a6830';  // dark gold on light bg

/* ── Shared diamond SVG ── */
function Diamond({ size = 56, color = G }) {
  const w = size, h = Math.round(size * 1.46);
  const m = w / 2;
  const ty = Math.round(h * 0.17);
  const fy = Math.round(h * 0.09);
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} fill="none">
      <polygon points={`${m},0 ${w},${ty*2} ${m},${h} 0,${ty*2}`} stroke={color} strokeWidth="1.5"/>
      <polyline points={`0,${ty*2} ${m},${fy} ${w},${ty*2}`} stroke={color} strokeWidth="0.75" opacity="0.65"/>
      <line x1={m} y1="0" x2={m} y2={fy} stroke={color} strokeWidth="0.75" opacity="0.65"/>
      <polygon
        points={`${m},${fy} ${Math.round(w*0.78)},${ty*2.2} ${m},${Math.round(h*0.85)} ${Math.round(w*0.22)},${ty*2.2}`}
        stroke={color} strokeWidth="0.5" opacity="0.38"
      />
    </svg>
  );
}

/* ══════════════════════════════════════
   LOGO 1 — Calligraphic Script
   Great Vibes cursive, gold on dark
══════════════════════════════════════ */
function Logo1({ dark = true }) {
  const bg = dark ? DARK : IVORY;
  const text = dark ? G : DG;
  const sub  = dark ? GM : '#6a4e20';
  return (
    <div style={{
      background: bg, width:'100%', height:'100%',
      display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', gap:14
    }}>
      <div style={{
        fontFamily:"'Great Vibes', cursive",
        fontSize: 76, color: text, lineHeight: 1, letterSpacing: 2
      }}>Dongleer</div>
      <div style={{
        fontFamily:"'Cinzel', serif",
        fontSize: 10, color: sub, letterSpacing: 7
      }}>FINE JEWELLERY</div>
    </div>
  );
}

/* ══════════════════════════════════════
   LOGO 2 — Serif Wordmark
   Cormorant Garamond 300, ruled lines
══════════════════════════════════════ */
function Logo2({ dark = true }) {
  const bg  = dark ? DARK : IVORY;
  const txt = dark ? TXT  : WARM_DARK;
  const acc = dark ? G    : DG;
  return (
    <div style={{
      background: bg, width:'100%', height:'100%',
      display:'flex', alignItems:'center', justifyContent:'center',
      padding:'0 48px'
    }}>
      <div style={{ textAlign:'center', width:'100%' }}>
        <div style={{
          width:'100%', height:'0.5px',
          background:`linear-gradient(90deg,transparent,${acc},transparent)`,
          marginBottom: 22
        }}></div>
        <div style={{
          fontFamily:"'Cormorant Garamond', serif",
          fontSize: 46, color: txt,
          letterSpacing: 16, fontWeight: 300, lineHeight: 1
        }}>DONGLEER</div>
        <div style={{
          fontFamily:"'Cinzel', serif",
          fontSize: 9, color: acc,
          letterSpacing: 5, marginTop: 14
        }}>FINE JEWELLERY · EST. MMXXIV</div>
        <div style={{
          width:'100%', height:'0.5px',
          background:`linear-gradient(90deg,transparent,${acc},transparent)`,
          marginTop: 22
        }}></div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   LOGO 3 — Diamond Mark + Wordmark
   Geometric diamond icon beside wordmark
══════════════════════════════════════ */
function Logo3({ dark = true }) {
  const bg   = dark ? DARK  : IVORY;
  const txt  = dark ? TXT   : WARM_DARK;
  const acc  = dark ? G     : DG;
  const div  = dark ? '#2a2516' : '#d4cbb8';
  return (
    <div style={{
      background: bg, width:'100%', height:'100%',
      display:'flex', alignItems:'center', justifyContent:'center',
      gap: 0
    }}>
      <Diamond size={48} color={acc} />
      <div style={{ width: 1, height: 80, background: div, margin:'0 30px' }}></div>
      <div>
        <div style={{
          fontFamily:"'Cormorant Garamond', serif",
          fontSize: 44, color: txt,
          letterSpacing: 10, fontWeight: 400, lineHeight: 1
        }}>DONGLEER</div>
        <div style={{
          fontFamily:"'Cinzel', serif",
          fontSize: 9, color: acc,
          letterSpacing: 5, marginTop: 10
        }}>FINE JEWELLERY</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   LOGO 4 — Monogram D in Double Circle
   Italic D, concentric circles, wordmark
══════════════════════════════════════ */
function Logo4({ dark = true }) {
  const bg   = dark ? DARK : IVORY;
  const txt  = dark ? TXT  : WARM_DARK;
  const acc  = dark ? G    : DG;
  const rule = dark ? '#2a2516' : '#d4cbb8';
  return (
    <div style={{
      background: bg, width:'100%', height:'100%',
      display:'flex', alignItems:'center', justifyContent:'center',
      gap: 28
    }}>
      {/* Circle monogram */}
      <div style={{ position:'relative', width: 96, height: 96, flexShrink: 0 }}>
        <svg width="96" height="96" viewBox="0 0 96 96" fill="none"
             style={{ position:'absolute', inset: 0 }}>
          <circle cx="48" cy="48" r="45" stroke={acc} strokeWidth="1"/>
          <circle cx="48" cy="48" r="37" stroke={acc} strokeWidth="0.4" opacity="0.45"/>
        </svg>
        <div style={{
          position:'absolute', inset: 0,
          display:'flex', alignItems:'center', justifyContent:'center',
          fontFamily:"'Cormorant Garamond', serif",
          fontSize: 64, fontStyle:'italic',
          color: acc, fontWeight: 500, lineHeight: 1
        }}>D</div>
      </div>
      {/* Wordmark stack */}
      <div>
        <div style={{
          fontFamily:"'Cormorant Garamond', serif",
          fontSize: 30, color: txt,
          letterSpacing: 10, fontWeight: 300, lineHeight: 1
        }}>DONGLEER</div>
        <div style={{ height:'0.5px', background: rule, margin:'11px 0' }}></div>
        <div style={{
          fontFamily:"'Cinzel', serif",
          fontSize: 8, color: acc, letterSpacing: 4
        }}>FINE JEWELLERY</div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   LOGO 5 — Thin Line Luxury Sans
   Montserrat 100, extreme tracking,
   flanked by gold diamond ornaments
══════════════════════════════════════ */
function Logo5({ dark = true }) {
  const bg  = dark ? DARK  : IVORY;
  const txt = dark ? TXT   : WARM_DARK;
  const acc = dark ? G     : DG;
  const Ornament = () => (
    <svg width="8" height="11" viewBox="0 0 8 11" style={{ flexShrink:0 }}>
      <polygon points="4,0 8,4 4,11 0,4" fill={acc} opacity="0.8"/>
    </svg>
  );
  return (
    <div style={{
      background: bg, width:'100%', height:'100%',
      display:'flex', alignItems:'center', justifyContent:'center',
      padding:'0 52px'
    }}>
      <div style={{ textAlign:'center', width:'100%' }}>
        {/* Top rule + ornament */}
        <div style={{ display:'flex', alignItems:'center', gap: 12, marginBottom: 20 }}>
          <div style={{ flex:1, height:'0.5px', background: acc, opacity: 0.55 }}></div>
          <Ornament />
          <div style={{ flex:1, height:'0.5px', background: acc, opacity: 0.55 }}></div>
        </div>
        {/* Wordmark */}
        <div style={{
          fontFamily:"'Montserrat', sans-serif",
          fontSize: 23, color: txt,
          letterSpacing: 20, fontWeight: 100,
          lineHeight: 1, paddingLeft: 20
        }}>DONGLEER</div>
        {/* Tagline */}
        <div style={{
          fontFamily:"'Montserrat', sans-serif",
          fontSize: 8, color: acc,
          letterSpacing: 8, fontWeight: 300,
          marginTop: 12, paddingLeft: 8
        }}>FINE  JEWELLERY</div>
        {/* Bottom rule + ornament */}
        <div style={{ display:'flex', alignItems:'center', gap: 12, marginTop: 20 }}>
          <div style={{ flex:1, height:'0.5px', background: acc, opacity: 0.55 }}></div>
          <Ornament />
          <div style={{ flex:1, height:'0.5px', background: acc, opacity: 0.55 }}></div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════
   APP
══════════════════════════════════════ */
function App() {
  return (
    <DesignCanvas>
      <DCSection
        id="dark"
        title="Logo Concepts — Dark Colourway"
        subtitle="Primary presentation on warm-black background with gold accents"
      >
        <DCArtboard id="l1d" label="01 — Calligraphic Script" width={520} height={280}>
          <Logo1 dark={true} />
        </DCArtboard>
        <DCArtboard id="l2d" label="02 — Serif Wordmark" width={520} height={280}>
          <Logo2 dark={true} />
        </DCArtboard>
        <DCArtboard id="l3d" label="03 — Diamond Mark" width={540} height={280}>
          <Logo3 dark={true} />
        </DCArtboard>
        <DCArtboard id="l4d" label="04 — Monogram D" width={520} height={280}>
          <Logo4 dark={true} />
        </DCArtboard>
        <DCArtboard id="l5d" label="05 — Thin Line Sans" width={520} height={280}>
          <Logo5 dark={true} />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="light"
        title="Logo Concepts — Light Colourway"
        subtitle="Alternate presentation on warm ivory / parchment background"
      >
        <DCArtboard id="l1l" label="01 — Calligraphic Script" width={520} height={280}>
          <Logo1 dark={false} />
        </DCArtboard>
        <DCArtboard id="l2l" label="02 — Serif Wordmark" width={520} height={280}>
          <Logo2 dark={false} />
        </DCArtboard>
        <DCArtboard id="l3l" label="03 — Diamond Mark" width={540} height={280}>
          <Logo3 dark={false} />
        </DCArtboard>
        <DCArtboard id="l4l" label="04 — Monogram D" width={520} height={280}>
          <Logo4 dark={false} />
        </DCArtboard>
        <DCArtboard id="l5l" label="05 — Thin Line Sans" width={520} height={280}>
          <Logo5 dark={false} />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
